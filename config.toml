# ROM Filter Copy — default configuration template.
# The tool copies this to config.local.toml on first run if it doesn't exist.
# Edit config.local.toml (or the GUI) for your personal settings.
# This file is the committed baseline — it should stay path-free.

roms_dir = ""
esde_data_dir = ""
target_roms_dir = ""
target_esde_data_dir = ""

rating = 7.0
overwrite = false
include_unrated = false
verbose = false
skip_systems = []

copy_all_systems = []
bypass_keywords = []
exclude_keywords = []

[system_ratings]
# Override the global rating threshold for specific systems.
# Example: n3ds = 7.5
# Example: psx  = 6.0

[genre_map]
