name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest pytest-cov ruff mypy

      - name: Lint and type-check
        run: ./validate check

      - name: Test with coverage
        run: |
          set -o pipefail
          python3 -m pytest -v --cov=src --cov-report=term-missing 2>&1 | tee /tmp/pytest.txt
          {
            echo '## Coverage'
            echo '```'
            grep -E '^(src/|TOTAL)' /tmp/pytest.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
